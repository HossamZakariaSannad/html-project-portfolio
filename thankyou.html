<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | Hossam Zakaria</title>
    <meta
      name="description"
      content="Thank you for contacting Hossam Zakaria. Your message has been sent successfully."
    />
    <link rel="icon" type="image/svg+xml" href="res/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --surface: rgba(15, 23, 42, 0.84);
        --text: #e5eefb;
        --muted: #9fb0cb;
        --border: rgba(159, 176, 203, 0.18);
        --gradient: linear-gradient(135deg, #4fd1c5 0%, #7dd3fc 55%, #22c55e 100%);
        --shadow: 0 24px 60px rgba(3, 7, 18, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(14, 165, 233, 0.2), transparent 30%),
          radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.18), transparent 28%),
          var(--bg);
      }

      .card {
        width: min(100%, 640px);
        padding: 2rem;
        border-radius: 1.75rem;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .icon {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1.4rem;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--gradient);
        color: #06111e;
        font-size: 2rem;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.1;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.85rem;
        margin-top: 1.75rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        min-height: 3.2rem;
        padding: 0.9rem 1.2rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        border-color: rgba(79, 209, 197, 0.35);
      }

      .btn-primary {
        background: var(--gradient);
        color: #06111e;
        border-color: transparent;
      }

      .countdown {
        margin-top: 1.2rem;
        font-size: 0.95rem;
      }

      @media (max-width: 540px) {
        .card {
          padding: 1.4rem;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon"><i class="ri-check-line"></i></div>
      <h1>Message sent successfully.</h1>
      <p>
        Thanks for reaching out. Your message is on its way, and I will get back
        to you as soon as possible.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="index.html">
          <i class="ri-home-4-line"></i>
          <span>Back to home</span>
        </a>
        <a class="btn" href="index.html#projects">
          <i class="ri-layout-grid-line"></i>
          <span>View projects</span>
        </a>
      </div>
      <p class="countdown">
        Redirecting in <span id="countdown">10</span> seconds.
      </p>
    </main>

    <script>
      let seconds = 10;
      const countdown = document.getElementById('countdown');
      const timer = window.setInterval(() => {
        seconds -= 1;
        countdown.textContent = String(seconds);

        if (seconds <= 0) {
          window.clearInterval(timer);
          window.location.href = 'index.html';
        }
      }, 1000);
    </script>
  </body>
</html>
