<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting Hossam Zakaria. Your message has been sent successfully.">
    <title>Thank You | Hossam Zakaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00ffcc;
            --primary-dark: #00cc99;
            --background-dark: #0f0f0f;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --gradient-background: linear-gradient(-45deg, #001f26, #003d3a, #005853, #00756c);
            --gradient-primary: linear-gradient(135deg, #00ffcc 0%, #00cc99 100%);
            --shadow-glow: 0 0 30px rgba(0, 255, 204, 0.3);
            --shadow-glow-strong: 0 0 50px rgba(0, 255, 204, 0.5);
            --border-radius-lg: 1rem;
            --border-radius-xl: 1.5rem;
            --border-radius-full: 9999px;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --transition-normal: 0.3s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-background);
            background-size: 400% 400%;
            animation: backgroundShift 15s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        @keyframes backgroundShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .thank-you-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .thank-you-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: var(--border-radius-xl) var(--border-radius-xl) 0 0;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-primary);
            border-radius: var(--border-radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-lg);
            font-size: 3rem;
            color: var(--background-dark);
            animation: successPulse 2s ease-in-out infinite;
            box-shadow: var(--shadow-glow-strong);
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .thank-you-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--spacing-md);
            animation: fadeInUp 0.8s ease-out;
        }

        .thank-you-message {
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: var(--spacing-xl);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: var(--border-radius-full);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--background-dark);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow-strong);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        .countdown-text {
            margin-top: var(--spacing-xl);
            font-size: 0.875rem;
            color: var(--text-secondary);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .countdown-number {
            color: var(--primary-color);
            font-weight: 600;
        }

        .social-links {
            margin-top: var(--spacing-xl);
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius-full);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.25rem;
            transition: all var(--transition-normal);
        }

        .social-link:hover {
            background: var(--primary-color);
            color: var(--background-dark);
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .thank-you-container {
                padding: var(--spacing-lg);
                margin: var(--spacing-md);
            }

            .thank-you-title {
                font-size: 2rem;
            }

            .thank-you-message {
                font-size: 1.125rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .success-icon {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
        }

        /* Particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 204, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(-10px) rotate(240deg); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="thank-you-container">
        <div class="success-icon">
            <i class="ri-check-line"></i>
        </div>
        
        <h1 class="thank-you-title">Thank You!</h1>
        
        <p class="thank-you-message">
            Your message has been sent successfully! I appreciate you reaching out and will get back to you as soon as possible.
        </p>
        
        <div class="action-buttons">
            <a href="index.html" class="btn btn-primary">
                <i class="ri-home-4-line"></i>
                <span>Back to Home</span>
            </a>
            <a href="index.html#projects" class="btn btn-secondary">
                <i class="ri-folder-3-line"></i>
                <span>View Projects</span>
            </a>
        </div>
        
        <p class="countdown-text">
            Redirecting to homepage in <span class="countdown-number" id="countdown">10</span> seconds
        </p>
        
        <div class="social-links">
            <a href="https://github.com/HossamZakariaSannad" target="_blank" class="social-link" aria-label="GitHub">
                <i class="ri-github-fill"></i>
            </a>
            <a href="https://www.linkedin.com/in/hossam-zakaria-s/" target="_blank" class="social-link" aria-label="LinkedIn">
                <i class="ri-linkedin-fill"></i>
            </a>
            <a href="https://www.facebook.com/hosam.zico.9/" target="_blank" class="social-link" aria-label="Facebook">
                <i class="ri-facebook-fill"></i>
            </a>
            <a href="https://www.instagram.com/hossam_zakaria_9/" target="_blank" class="social-link" aria-label="Instagram">
                <i class="ri-instagram-line"></i>
            </a>
        </div>
    </div>

    <script>
        // Countdown timer
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');
        
        const countdown = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = 'index.html';
            }
        }, 1000);
        
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const numberOfParticles = 20;
            
            for (let i = 0; i < numberOfParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Initialize particles when page loads
        window.addEventListener('load', createParticles);
        
        // Add keyboard support for accessibility
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });
        
        // Prevent auto-redirect if user interacts with the page
        let userInteracted = false;
        const interactionEvents = ['click', 'keydown', 'mousemove', 'touchstart'];
        
        interactionEvents.forEach(event => {
            document.addEventListener(event, () => {
                if (!userInteracted) {
                    userInteracted = true;
                    clearInterval(countdown);
                    countdownElement.parentElement.style.opacity = '0.5';
                    countdownElement.parentElement.innerHTML = 'Auto-redirect cancelled. Click "Back to Home" to continue.';
                }
            }, { once: true });
        });
    </script>
</body>
</html>
